<html>

<head>

	<script>
	

		function inicio() {

			var escolha = parseInt(prompt('Selecione uma opção 1.) Reserva de Quartos 2.) Cadastro de Hóspedes 3.) Abastecimento de Carros 4.) Sair'));

			if (escolha === 1) {
				reserva_quartos();
			} else if (escolha === 2) {
				cadastro_hospedes();
			} else if (escolha === 3) {
				abastecer_carros();
			} else if (escolha === 4) {
				sair();
			} else {
				erro();
			}
		}		

		//MENU PRINCIPAL
		function reserva_quartos() {
			alert('HOTEL DO LEOZAO - RESERVA DE QUARTOS');
			inicio();
		}

		function cadastro_hospedes() {
			alert('HOTEL DO LEOZAO - CADASTRO DE HÓSPEDES');
			inicio();
		}

		function eventos(){
			alert("HOTEL DO LEOZAO - EVENTOS")
			inicio();
		}

		function ar_condicionado(){
			alert("HOTEL DO LEOZAO - AR CONDICIONADO")
			inicio();
		}

		function abastecer_carros() {
			alert('HOTEL DO LEOZAO - ABASTECER');
			inicio();
		}

		function relatorios_operacionais(){
			alert("HOTEL DO LEOZAO - RELATÓRIOS OPERACIONAIS")
			inicio();
		}

		function sair() {
			var confirma = confirm('Você deseja sair?');
			if (confirma) {
				window.close();
			} else {
				inicio();
			}
		}
		
		function erro() {
			alert('Por favor, informe um número entre 1 e 4');
			inicio();
		}

		function login(){
			var usuario = prompt("digite seu usuário")
			var contador_senha = 0
			while(true){
				var senha = prompt("digite a senha")
				if (senha != 2678){
					alert("Senha incorreta. Digite novamente")
					contador_senha ++
					if (contador_senha === 3){
						window.close()
					}
				} else {
					alert("Bem Vindo ao hotel do Leozão, " + usuario + "é um imenso prazer ter você por aqui")
					inicio()
					break
				}
			}
			}
		
		login();
	</script>
</head>

</body>

</html>
